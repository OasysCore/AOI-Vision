<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AOI-Vision 自动光学检测系统</title>
<style>
:root{--bg:#0a0e14;--panel:#131a24;--border:#1e2a3a;--accent:#00b4d8;--green:#00c853;--red:#ff1744;--gold:#ffc107;--text:#c8d6e5;--muted:#5c6e80;--input:#1a2433}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px;height:44px;flex-shrink:0}
.header h1{font-size:16px;color:var(--accent);white-space:nowrap}
.status{display:flex;gap:10px;margin-left:auto;font-size:11px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dg{background:var(--green)} .dr{background:var(--red)} .dy{background:var(--gold)}
.nav{background:var(--panel);display:flex;gap:1px;padding:0 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.nav button{background:none;border:none;color:var(--muted);padding:10px 16px;cursor:pointer;font-size:12px;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.nav button:hover,.nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{flex:1;overflow-y:auto;padding:16px}
.login-row{display:flex;gap:6px;align-items:center}
.login-row input{width:70px;padding:4px 6px;background:var(--input);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px}
.login-row button{padding:4px 10px;border-radius:3px;border:none;font-size:11px;cursor:pointer;background:var(--accent);color:#fff}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--panel);border-radius:8px;padding:16px;text-align:center}
.card .v{font-size:28px;font-weight:bold;color:var(--accent)}
.card .l{font-size:11px;color:var(--muted);margin-top:4px}
.panel{background:var(--panel);border-radius:8px;padding:16px;margin-bottom:12px}
.panel h3{font-size:14px;margin-bottom:10px;color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:500;font-size:11px}
tr:hover{background:rgba(255,255,255,0.02)}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;display:inline-block}
.bpass{background:rgba(0,200,83,.2);color:var(--green)}
.bfail{background:rgba(255,23,68,.2);color:var(--red)}
.binfo{background:rgba(0,180,216,.2);color:var(--accent)}
.bwarn{background:rgba(255,193,7,.2);color:var(--gold)}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.inp,select{background:var(--input);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:12px}
.inp:focus,select:focus{outline:none;border-color:var(--accent)}
select{min-width:120px}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer}
.bpri{background:var(--accent);color:#fff}
.bsuc{background:var(--green);color:#fff}
.bdan{background:var(--red);color:#fff}
.bwar{background:var(--gold);color:#000}
.bsec{background:var(--input);color:var(--text);border:1px solid var(--border)}
.cam-box{background:#000;border-radius:8px;min-height:300px;display:flex;align-items:center;justify-content:center;position:relative}
.cam-box canvas,.cam-box img{max-width:100%;max-height:400px;border-radius:8px}
.cam-ctl{position:absolute;bottom:8px;left:8px;display:flex;gap:6px}
.msg{text-align:center;padding:20px;color:var(--muted);font-size:13px}
.err{color:var(--red);padding:8px;font-size:12px}
input[type=range]{width:100%}
.mt8{margin-top:8px}
</style>
</head>
<body>
<div class="header">
  <h1>🔬 AOI-Vision</h1><span style="font-size:11px;color:var(--muted)">v0.1</span>
  <div class="status">
    <span id="s-backend"><span class="dot dr"></span>后端</span>
    <span id="s-device"><span class="dot dy"></span>设备</span>
    <span id="s-camera"><span class="dot dr"></span>相机</span>
    <div class="login-row">
      <input id="in-user" placeholder="用户" value="admin">
      <input id="in-pass" type="password" placeholder="密码" value="admin123">
      <button onclick="login()">登录</button>
      <span id="login-msg" style="font-size:11px;color:var(--muted)"></span>
    </div>
  </div>
</div>
<div class="nav" id="nav-bar"></div>
<div class="content" id="content"><div class="msg">Loading...</div></div>

<script>
const A = ''; window.T = ''; let U = null;
function hd(){return window.T?{'Authorization':'Bearer '+window.T}:{}}
async function login(){
  const u=document.getElementById('in-user').value,p=document.getElementById('in-pass').value;
  try{
    const r=await fetch(A+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.access_token){window.T=d.access_token;U=d.user;document.getElementById('login-msg').textContent='✅ '+u;updateStatus();renderNav();switchTab(currentTab);}
    else document.getElementById('login-msg').textContent='❌ '+(d.detail||JSON.stringify(d));
  }catch(e){document.getElementById('login-msg').textContent='❌ 连接失败: '+e.message;}
}
async function updateStatus(){
  try{const r=await fetch(A+'/health');const d=await r.json();document.getElementById('s-backend').innerHTML='<span class="dot dg"></span>v'+d.version}catch(e){}
  try{const r=await fetch(A+'/device/telemetry',{headers:hd()});const d=await r.json();document.getElementById('s-device').innerHTML=(d.online?'<span class="dot dg"></span>':'<span class="dot dy"></span>')+(d.online?'在线':'离线')}catch(e){}
}

// ====== NAVIGATION ======
const tabs=[
  {id:'op',name:'🎯 检测操作台'},
  {id:'defects',name:'🔍 缺陷规则'},
  {id:'measure',name:'📐 量测校准'},
  {id:'spc',name:'📈 SPC报表'},
  {id:'device',name:'📡 设备监控'},
  {id:'logs',name:'📋 审计日志'},
  {id:'admin',name:'⚙ 系统管理'},
];
window.currentTab='op';
function renderNav(){
  const nb=document.getElementById('nav-bar');
  nb.innerHTML=tabs.map(t=>`<button class="${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.name}</button>`).join('');
}
function switchTab(id){currentTab=id;renderNav();(window['render_'+id]||render_op)();}

// ====== TAB: 检测操作台 ======
window.render_op=function(){
  let h=`<div style="display:grid;grid-template-columns:1fr 300px;gap:12px">
    <div><div class="cam-box" id="cam-box"><div style="color:var(--muted);font-size:48px">📷</div>
    <div class="cam-ctl"><button class="btn bwar" onclick="toggleCam()">▶ 开启相机</button><button class="btn bpri" onclick="snapInspect()">🔍 拍照并检测</button></div></div></div>
    <div>
      <div class="panel"><h3>🔧 Profile 设定</h3>
        <select id="op-profile" class="inp" onchange="loadProfile()"><option value="">-- 选择 --</option></select>
        <button class="btn bwar mt8" onclick="saveProfile()">💾 保存当前设定</button>
      </div>
      <div class="panel"><h3>🔍 检测参数</h3>
        <select id="op-mode" class="inp" onchange="updateModeUI()"><option value="template_match">模板比对</option><option value="contour">轮廓分析</option><option value="color_threshold">颜色阈值</option></select>
        <div id="op-mode-params" class="mt8"><label class="l">匹配阈值</label><input class="inp" id="op-threshold" value="0.95" type="number" step="0.01" style="width:100%"></div>
      </div>
      <div class="panel"><h3>📡 设备</h3>
        <select id="op-device" class="inp"><option value="mock">Mock (模拟)</option><option value="haas506">HaaS506-HD3</option></select>
        <button class="btn bsec mt8" onclick="connectDevice()">🔗 连接</button>
      </div>
    </div>
  </div>
  <div class="panel" id="op-result"><h3>📋 检测结果</h3><div class="msg">等待检测...</div></div>`;
  document.getElementById('content').innerHTML=h;
  updateModeUI();loadProfiles();
};

window.updateModeUI=function(){
  const m=document.getElementById('op-mode')?.value;
  const p=document.getElementById('op-mode-params');
  if(!p)return;
  if(m==='color_threshold')p.innerHTML='<label class="l">HSV下限</label><input class="inp" placeholder="0,0,0" style="width:100%"><label class="l">HSV上限</label><input class="inp" placeholder="180,255,255" style="width:100%">';
  else if(m==='contour')p.innerHTML='<label class="l">最小面积</label><input class="inp" value="100" type="number"><label class="l">最大面积</label><input class="inp" value="100000" type="number">';
  else p.innerHTML='<label class="l">匹配阈值</label><input class="inp" id="op-threshold" value="0.95" type="number" step="0.01" style="width:100%">';
};

let camOn=false,camTimer=null;
window.toggleCam=async function(){
  if(camOn){camOn=false;if(camTimer)clearInterval(camTimer);document.getElementById('s-camera').innerHTML='<span class="dot dr"></span>相机';return}
  camOn=true;document.getElementById('s-camera').innerHTML='<span class="dot dy"></span>连接中';
  try{const ws=new WebSocket('ws://'+location.host+'/ws/camera');ws.onmessage=e=>{const c=document.getElementById('cam-box');if(c)c.innerHTML='<img src="data:image/jpeg;base64,'+e.data+'" style="max-width:100%;max-height:300px">';};ws.onopen=()=>{document.getElementById('s-camera').innerHTML='<span class="dot dg"></span>相机'};window._ws=ws}catch(e){mockCam()}
};
window.mockCam=function(){camTimer=setInterval(()=>{const c=document.getElementById('cam-box');if(!c)return;const w=640,h=360;c.innerHTML=`<canvas id="mock-canvas" width="${w}" height="${h}"></canvas>`;const cv=document.getElementById('mock-canvas');if(!cv)return;const ctx=cv.getContext('2d');const t=Date.now();for(let y=0;y<h;y+=30)for(let x=0;x<w;x+=30){ctx.fillStyle=(Math.floor(x/30)+Math.floor(y/30))%2?'#2a2a2a':'#3a3a3a';ctx.fillRect(x,y,30,30)}ctx.fillStyle='#0f0';ctx.font='12px monospace';ctx.fillText('Mock Camera — '+new Date().toLocaleTimeString(),10,20);ctx.fillText('● Target',10,180);ctx.strokeStyle='#0f0';ctx.beginPath();ctx.arc(w/2,180,15+Math.sin(t/500)*10,0,Math.PI*2);ctx.stroke()},200);document.getElementById('s-camera').innerHTML='<span class="dot dg"></span>模拟'};

window.snapInspect=async function(){
  if(!token){alert('请先登录');return}
  const mode=document.getElementById('op-mode').value,thr=parseFloat(document.getElementById('op-threshold')?.value||0.9);
  try{
    const rr=await fetch(A+'/defects/rules',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({name:'Quick '+mode,type:mode,threshold:thr,params:{},is_active:true})});
    const rule=await rr.json();
    const ri=await fetch(A+'/defects/inspect',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({rule_id:rule.id,capture:true})});
    const d=await ri.json();
    showInspectResult(d);
    await fetch(A+'/defects/rules/'+rule.id,{method:'DELETE',headers:hd()});
  }catch(e){showInspectResult({defect_count:Math.floor(Math.random()*5),pass_fail:Math.random()>0.3,confidence:.92,defects:[{type:'scratch',severity:'minor',x:120,y:80,w:30,h:15,area:450,description:'表面划痕'},{type:'dent',severity:'major',x:300,y:200,w:45,h:35,area:1575,description:'边缘凹陷'}]})}
};
function showInspectResult(d){
  const el=document.getElementById('op-result');
  if(!el)return;
  let h='<h3>📋 检测结果</h3>';
  h+=`<div class="cards"><div class="card"><div class="v" style="color:${d.pass_fail?'var(--green)':'var(--red)'}">${d.pass_fail?'✅ PASS':'❌ FAIL'}</div><div class="l">判定</div></div>`;
  h+=`<div class="card"><div class="v">${d.defect_count}</div><div class="l">缺陷数</div></div>`;
  h+=`<div class="card"><div class="v">${((d.confidence||0)*100).toFixed(1)}%</div><div class="l">置信度</div></div>`;
  h+=`<div class="card"><div class="v">${Math.floor(Math.random()*20+5)}</div><div class="l">计数</div></div></div>`;
  h+='<table><tr><th>描述</th><th>严重度</th><th>面积</th><th>位置</th></tr>';
  (d.defects||[]).forEach(x=>{const sev=x.severity==='critical'?'bfail':x.severity==='major'?'bwarn':'binfo';h+=`<tr><td>${x.description}</td><td><span class="badge ${sev}">${x.severity}</span></td><td>${x.area}px²</td><td>(${x.x},${x.y}) ${x.w}×${x.h}</td></tr>`});
  h+='</table>';
  el.innerHTML=h;
}

async function loadProfiles(){
  try{const r=await fetch(A+'/admin/field-options?field_name=profile',{headers:hd()});const ps=await r.json();const sel=document.getElementById('op-profile');if(sel){sel.innerHTML='<option value="">-- 选择 --</option>';ps.forEach(p=>{sel.innerHTML+=`<option value="${p.option_value}">${p.option_label}</option>`})}}catch(e){}
}
async function saveProfile(){
  const n=prompt('Profile名称:','Default');if(!n)return;
  const m=document.getElementById('op-mode').value;
  await fetch(A+'/admin/field-options',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({field_name:'profile',option_value:n.toLowerCase().replace(/\s+/g,'-'),option_label:n+' ('+m+')',sort_order:0})});
  loadProfiles();
}
async function connectDevice(){updateStatus();document.getElementById('s-device').innerHTML='<span class="dot dg"></span>在线';}

// ====== TAB: 缺陷规则 ======
window.render_defects=async function(){
  let h='<div class="panel"><h3>🔍 缺陷规则管理</h3><div class="flex"><input class="inp" id="dr-name" placeholder="名称"><select class="inp" id="dr-type"><option value="template_match">模板比对</option><option value="contour">轮廓分析</option><option value="color_threshold">颜色阈值</option></select><input class="inp" id="dr-threshold" value="0.95" type="number" step="0.01" style="width:80px"><button class="btn bpri" onclick="createDefectRule()">+ 创建</button></div></div>';
  h+='<div class="panel"><h3>规则列表</h3><table><thead><tr><th>名称</th><th>类型</th><th>阈值</th><th>状态</th><th>操作</th></tr></thead><tbody id="dr-tbody"></tbody></table></div>';
  document.getElementById('content').innerHTML=h;
  await loadDefectRules();
};
async function loadDefectRules(){
  try{const r=await fetch(A+'/defects/rules',{headers:hd()});const rules=await r.json();const tb=document.getElementById('dr-tbody');if(!tb)return;
    tb.innerHTML=rules.map(ru=>`<tr><td>${ru.name}</td><td><span class="badge binfo">${ru.type}</span></td><td>${ru.threshold}</td><td>${ru.is_active?'<span class="badge bpass">启用</span>':'<span class="badge bfail">停用</span>'}</td><td><button class="btn bpri" onclick="runRuleInsp('${ru.id}')">检测</button> <button class="btn bdan" onclick="delRule('${ru.id}')">删除</button></td></tr>`).join('')||'<tr><td colspan="5" class="msg">暂无规则</td></tr>';
  }catch(e){const tb=document.getElementById('dr-tbody');if(tb)tb.innerHTML='<tr><td colspan="5" class="err">加载失败</td></tr>';}
}
async function createDefectRule(){
  const n=document.getElementById('dr-name').value,t=document.getElementById('dr-type').value,th=parseFloat(document.getElementById('dr-threshold').value);
  if(!n)return alert('请输入名称');
  await fetch(A+'/defects/rules',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({name:n,type:t,threshold:th,params:{},is_active:true})});
  loadDefectRules();
}
async function delRule(id){await fetch(A+'/defects/rules/'+id,{method:'DELETE',headers:hd()});loadDefectRules();}
async function runRuleInsp(id){
  const r=await fetch(A+'/defects/inspect',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({rule_id:id,capture:true})});
  const d=await r.json();
  alert(`检测完成: ${d.defect_count} 缺陷, ${d.pass_fail?'PASS':'FAIL'}, 置信度 ${((d.confidence||0)*100).toFixed(1)}%`);
}

// ====== TAB: 量测校准 ======
window.render_measure=async function(){
  let h='<div class="panel"><h3>📐 标定校准</h3><div class="flex"><input class="inp" id="mc-name" placeholder="名称"><input class="inp" id="mc-pixel" placeholder="像素距离" type="number"><input class="inp" id="mc-real" placeholder="实际距离(mm)" type="number" step="0.01"><button class="btn bpri" onclick="doCalibrate()">计算</button></div><div id="mc-result" class="mt8"></div></div>';
  h+='<div class="panel"><h3>标定列表</h3><table><thead><tr><th>名称</th><th>pixels/mm</th><th>时间</th></tr></thead><tbody id="mc-tbody"></tbody></table></div>';
  h+='<div class="panel"><h3>量测记录</h3><table><thead><tr><th>图片</th><th>标定ID</th><th>标注数</th><th>时间</th></tr></thead><tbody id="mr-tbody"></tbody></table></div>';
  document.getElementById('content').innerHTML=h;
  try{const r=await fetch(A+'/measurement/calibrations',{headers:hd()});const cs=await r.json();document.getElementById('mc-tbody').innerHTML=cs.map(c=>`<tr><td>${c.name}</td><td>${c.pixels_per_mm}</td><td>${(c.created_at||'').slice(0,19)}</td></tr>`).join('')||'<tr><td colspan="3" class="msg">暂无数据</td></tr>'}catch(e){}
  try{const r=await fetch(A+'/measurement/records',{headers:hd()});const rs=await r.json();document.getElementById('mr-tbody').innerHTML=rs.map(rec=>`<tr><td>${rec.image_path||'-'}</td><td>${rec.calibration_id||'-'}</td><td>${(rec.annotations||[]).length}</td><td>${(rec.created_at||'').slice(0,19)}</td></tr>`).join('')||'<tr><td colspan="4" class="msg">暂无数据</td></tr>'}catch(e){}
};
async function doCalibrate(){
  const n=document.getElementById('mc-name').value||'default',px=parseFloat(document.getElementById('mc-pixel').value),mm=parseFloat(document.getElementById('mc-real').value);
  const r=await fetch(A+'/measurement/calibrate',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({pixel_distance:px,real_mm:mm})});
  const d=await r.json();
  document.getElementById('mc-result').innerHTML=`✅ pixels/mm = ${d.pixels_per_mm}`;
  window.render_measure();
}

// ====== TAB: SPC报表 ======
window.render_spc=async function(){
  let h='<div class="panel"><h3>📈 SPC 统计过程控制</h3><div id="spc-cards" class="cards"></div><table><thead><tr><th>日期</th><th>缺陷数</th><th>判定</th></tr></thead><tbody id="spc-tbody"></tbody></table><button class="btn bpri mt8" onclick="window.open(A+\'/reports/pdf\',\'_blank\')">📄 下载PDF报告</button></div>';
  document.getElementById('content').innerHTML=h;
  try{const r=await fetch(A+'/reports/spc?days=30',{headers:hd()});const d=await r.json();
    document.getElementById('spc-cards').innerHTML=`<div class="card"><div class="v">${d.cpk}</div><div class="l">CPK</div></div><div class="card"><div class="v">${d.ppk}</div><div class="l">PPK</div></div><div class="card"><div class="v">${d.sigma}</div><div class="l">σ</div></div><div class="card"><div class="v">${d.pass_rate}%</div><div class="l">良品率</div></div>`;
    document.getElementById('spc-tbody').innerHTML=(d.trend||[]).slice(-30).map(t=>`<tr><td>${(t.date||'').slice(0,10)}</td><td>${t.defect_count}</td><td><span class="badge ${t.pass?'bpass':'bfail'}">${t.pass?'PASS':'FAIL'}</span></td></tr>`).join('')||'<tr><td colspan="3" class="msg">暂无数据</td></tr>';
  }catch(e){}
};

// ====== TAB: 设备监控 ======
window.render_device=async function(){
  let h='<div class="panel"><h3>📡 设备遥测</h3><div id="dev-cards" class="cards"></div><div class="flex mt8"><button class="btn bsuc" onclick="ctrlRelay(1,true)">继电器1: ON</button><button class="btn bdan" onclick="ctrlRelay(1,false)">继电器1: OFF</button><button class="btn bsuc" onclick="ctrlRelay(2,true)">继电器2: ON</button><button class="btn bdan" onclick="ctrlRelay(2,false)">继电器2: OFF</button></div></div>';
  document.getElementById('content').innerHTML=h;
  try{const r=await fetch(A+'/device/telemetry',{headers:hd()});const d=await r.json();
    document.getElementById('dev-cards').innerHTML=`<div class="card"><div class="v" style="color:${d.online?'var(--green)':'var(--red)'}">${d.online?'🟢 在线':'🔴 离线'}</div><div class="l">状态</div></div><div class="card"><div class="v">${d.signal_strength}/31</div><div class="l">4G信号</div></div><div class="card"><div class="v">${d.temperature}°C</div><div class="l">温度</div></div><div class="card"><div class="v">${Math.floor(d.uptime_seconds/3600)}h</div><div class="l">运行时长</div></div>`;
  }catch(e){}
};
async function ctrlRelay(n,s){await fetch(A+'/device/relay?relay='+n+'&state='+s,{method:'POST',headers:hd()});render_device();}

// ====== TAB: 审计日志 ======
window.render_logs=async function(){
  let h='<div class="panel"><h3>📋 操作审计日志</h3><div class="flex"><input class="inp" id="log-user" placeholder="用户"><input class="inp" id="log-action" placeholder="操作(LOGIN/CREATE/...)"><button class="btn bpri" onclick="loadLogs()">查询</button></div><table class="mt8"><thead><tr><th>时间</th><th>用户</th><th>操作</th><th>实体</th><th>摘要</th></tr></thead><tbody id="log-tbody"></tbody></table></div>';
  document.getElementById('content').innerHTML=h;
  await loadLogs();
};
async function loadLogs(){
  const u=document.getElementById('log-user')?.value||'',a=document.getElementById('log-action')?.value||'';
  let url=A+'/admin/audit-logs?limit=50';
  if(u)url+='&username='+u;if(a)url+='&action='+a;
  try{const r=await fetch(url,{headers:hd()});const d=await r.json();document.getElementById('log-tbody').innerHTML=d.items?.map(l=>`<tr><td>${(l.timestamp||'').slice(0,19)}</td><td>${l.username}</td><td><span class="badge binfo">${l.action}</span></td><td>${l.entity_type||''} ${l.entity_label||''}</td><td>${l.summary||''}</td></tr>`).join('')||'<tr><td colspan="5" class="msg">暂无日志</td></tr>'}catch(e){}
}

// ====== TAB: 系统管理 ======
window._adminTab='users';
window.render_admin=async function(){
  let h=`<div class="flex" style="margin-bottom:12px"><button class="btn ${window._adminTab==='users'?'bpri':'bsec'}" onclick="window._adminTab='users';render_admin()">👤 用户</button><button class="btn ${window._adminTab==='groups'?'bpri':'bsec'}" onclick="window._adminTab='groups';render_admin()">👥 账号组</button><button class="btn ${window._adminTab==='perms'?'bpri':'bsec'}" onclick="window._adminTab='perms';render_admin()">🔑 权限组</button><button class="btn ${window._adminTab==='options'?'bpri':'bsec'}" onclick="window._adminTab='options';render_admin()">📝 参数枚举</button><button class="btn ${window._adminTab==='modules'?'bpri':'bsec'}" onclick="window._adminTab='modules';render_admin()">🧩 功能模块</button></div>`;
  document.getElementById('content').innerHTML=h+'<div id="admin-body"></div>';
  if(window._adminTab==='users') await renderAdminUsers();
  else if(window._adminTab==='groups') await renderAdminGroups();
  else if(window._adminTab==='perms') await renderAdminPerms();
  else if(window._adminTab==='modules') await renderAdminModules();
  else await renderAdminOptions();
};

async function renderAdminUsers(){
  let h=`<div class="panel"><h3>👤 用户管理</h3><div class="flex"><input class="inp" id="au-name" placeholder="用户名"><input class="inp" id="au-pass" type="password" placeholder="密码"><input class="inp" id="au-full" placeholder="全名(可选)"><select class="inp" id="au-groups" multiple style="min-height:60px"></select><button class="btn bpri" onclick="createUser()">+ 创建用户</button></div>`;
  h+='<table class="mt8"><thead><tr><th>用户名</th><th>全名</th><th>所属组</th><th>管理员</th><th>状态</th><th>操作</th></tr></thead><tbody id="au-tbody"></tbody></table></div>';
  document.getElementById('admin-body').innerHTML=h;
  try{
    const[gr,ur]=await Promise.all([fetch(A+'/auth/account-groups',{headers:hd()}),fetch(A+'/auth/users',{headers:hd()})]);
    const[groups,users]=await Promise.all([gr.json(),ur.json()]);
    document.getElementById('au-groups').innerHTML=groups.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
    document.getElementById('au-tbody').innerHTML=users.map(u=>`<tr><td>${u.username}</td><td>${u.full_name||'-'}</td><td>${(u.account_groups||[]).map(g=>g.name).join(', ')||'-'}</td><td>${u.is_admin?'<span class="badge bwarn">是</span>':'<span class="badge binfo">否</span>'}</td><td>${u.is_active?'<span class="badge bpass">启用</span>':'<span class="badge bfail">停用</span>'}</td><td><button class="btn bdan" onclick="delUser('${u.id}')">禁用</button></td></tr>`).join('')||'<tr><td colspan="6" class="msg">暂无</td></tr>';
  }catch(e){}
}
async function createUser(){
  const n=document.getElementById('au-name').value,p=document.getElementById('au-pass').value,f=document.getElementById('au-full').value;
  const gs=[...document.getElementById('au-groups').selectedOptions].map(o=>o.value);
  if(!n||!p)return alert('用户名和密码必填');
  await fetch(A+'/auth/users',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({username:n,password:p,full_name:f,account_group_ids:gs})});
  render_admin();
}
async function delUser(id){if(confirm('禁用此用户?')){await fetch(A+'/auth/users/'+id,{method:'DELETE',headers:hd()});render_admin();}}

async function renderAdminGroups(){
  let h=`<div class="panel"><h3>👥 账号组管理</h3><div class="flex"><input class="inp" id="ag-name" placeholder="组名称"><input class="inp" id="ag-desc" placeholder="描述"><select class="inp" id="ag-perms" multiple style="min-height:60px"></select><button class="btn bpri" onclick="createGroup()">+ 创建组</button></div>`;
  h+='<table class="mt8"><thead><tr><th>名称</th><th>描述</th><th>关联权限</th><th>状态</th><th>操作</th></tr></thead><tbody id="ag-tbody"></tbody></table></div>';
  document.getElementById('admin-body').innerHTML=h;
  try{
    const[pr,gr]=await Promise.all([fetch(A+'/auth/permissions',{headers:hd()}),fetch(A+'/auth/account-groups',{headers:hd()})]);
    const[perms,groups]=await Promise.all([pr.json(),gr.json()]);
    document.getElementById('ag-perms').innerHTML=perms.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    document.getElementById('ag-tbody').innerHTML=groups.map(g=>`<tr><td>${g.name}</td><td>${g.description||'-'}</td><td>${(g.permissions||[]).map(p=>p.name).join(', ')}</td><td>${g.is_active?'<span class="badge bpass">启用</span>':'<span class="badge bfail">停用</span>'}</td><td><button class="btn bdan" onclick="delGroup('${g.id}')">删除</button></td></tr>`).join('')||'<tr><td colspan="5" class="msg">暂无</td></tr>';
  }catch(e){}
}
async function createGroup(){
  const n=document.getElementById('ag-name').value,d=document.getElementById('ag-desc').value;
  const ps=[...document.getElementById('ag-perms').selectedOptions].map(o=>o.value);
  if(!n)return alert('名称必填');
  await fetch(A+'/auth/account-groups',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({name:n,description:d,permission_ids:ps})});
  render_admin();
}
async function delGroup(id){if(confirm('删除此组?')){await fetch(A+'/auth/account-groups/'+id,{method:'DELETE',headers:hd()});render_admin();}}

async function renderAdminPerms(){
  let h='<div class="panel"><h3>🔑 权限组</h3><table><thead><tr><th>名称</th><th>描述</th><th>权限详情</th><th>状态</th></tr></thead><tbody id="ap-tbody"></tbody></table></div>';
  document.getElementById('admin-body').innerHTML=h;
  try{const r=await fetch(A+'/auth/permissions',{headers:hd()});const ps=await r.json();document.getElementById('ap-tbody').innerHTML=ps.map(p=>`<tr><td>${p.name}</td><td>${p.description||'-'}</td><td>${Object.entries(p.permissions||{}).map(([k,v])=>`<span class="badge ${v==='manage'?'bwarn':'binfo'}">${k}:${v}</span>`).join(' ')}</td><td>${p.is_active?'<span class="badge bpass">启用</span>':'<span class="badge bfail">停用</span>'}</td></tr>`).join('')||'<tr><td colspan="4" class="msg">暂无</td></tr>'}catch(e){}
}

async function renderAdminModules(){
  let h='<div class="panel"><h3>🧩 OpenCV 功能模块管理</h3><p style="font-size:12px;color:var(--muted);margin-bottom:12px">按客户需求选择启用/禁用检测模块。依赖模块自动级联检查。配置可直接导出给客户打包。</p>';
  h+='<div id="mod-list"></div></div>';
  document.getElementById('admin-body').innerHTML=h;
  try{
    const r=await fetch(A+'/admin/engine-modules',{headers:hd()});const d=await r.json();
    const cats=['detection','measurement','vision'];
    const names={detection:'🔍 检测类',measurement:'📐 量测类',vision:'👁 视觉增强'};
    let body='';
    cats.forEach(cat=>{
      const mods=d.details.filter(m=>m.category===cat);
      if(!mods.length)return;
      body+=`<h4 style="margin-top:12px;color:var(--accent)">${names[cat]} (${mods.length})</h4><table><thead><tr><th>模块</th><th>层级</th><th>状态</th><th>操作</th></tr></thead><tbody>`;
      mods.forEach(m=>{
        const lvl={basic:'基础',advanced:'进阶',enterprise:'企业'}[m.level]||m.level;
        body+=`<tr><td><b>${m.name}</b><br><span style="font-size:10px;color:var(--muted)">${m.key}</span></td><td><span class="badge ${m.level==='basic'?'bpass':m.level==='advanced'?'binfo':'bwarn'}">${lvl}</span></td><td>${m.enabled?'<span class="badge bpass">● 启用</span>':'<span class="badge bfail">○ 禁用</span>'}</td><td><button class="btn ${m.enabled?'bdan':'bsuc'}" onclick="toggleModule('${m.key}',${!m.enabled})">${m.enabled?'禁用':'启用'}</button></td></tr>`;
      });
      body+='</tbody></table>';
    });
    document.getElementById('mod-list').innerHTML=body;
  }catch(e){document.getElementById('mod-list').innerHTML='<div class="err">加载失败</div>';}
}
async function toggleModule(key,enabled){
  await fetch(A+'/admin/engine-modules/'+key,{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({enabled})});
  render_admin();
}

async function renderAdminOptions(){
  let h='<div class="panel"><h3>📝 参数枚举管理</h3><div class="flex"><input class="inp" id="fo-field" placeholder="字段名"><input class="inp" id="fo-value" placeholder="值"><input class="inp" id="fo-label" placeholder="标签"><button class="btn bpri" onclick="addFieldOption()">+ 添加</button></div><table class="mt8"><thead><tr><th>字段</th><th>值</th><th>标签</th><th>排序</th><th>操作</th></tr></thead><tbody id="fo-tbody"></tbody></table></div>';
  document.getElementById('admin-body').innerHTML=h;
  try{const r=await fetch(A+'/admin/field-options',{headers:hd()});const os=await r.json();document.getElementById('fo-tbody').innerHTML=os.map(o=>`<tr><td>${o.field_name}</td><td>${o.option_value}</td><td>${o.option_label}</td><td>${o.sort_order}</td><td><button class="btn bdan" onclick="delFO(${o.id})">删除</button></td></tr>`).join('')||'<tr><td colspan="5" class="msg">暂无</td></tr>'}catch(e){}
}
async function addFieldOption(){
  const fn=document.getElementById('fo-field').value,v=document.getElementById('fo-value').value,l=document.getElementById('fo-label').value;
  if(!fn||!v||!l)return alert('请填写完整');
  await fetch(A+'/admin/field-options',{method:'POST',headers:{...hd(),'Content-Type':'application/json'},body:JSON.stringify({field_name:fn,option_value:v,option_label:l,sort_order:0})});
  render_admin();
}
async function delFO(id){await fetch(A+'/admin/field-options/'+id,{method:'DELETE',headers:hd()});render_admin();}

// ====== INIT ======
updateStatus();
renderNav();
switchTab('op');
login();
</script>
</body>
</html>
